---
# ─────────────────────────────────────────────────────────────────────────────
# roles/graylog/vars/main.yml  –  non-overridable internal constants
# ─────────────────────────────────────────────────────────────────────────────

graylog_apt_key_url:    "https://packages.graylog2.org/repo/debian/keyring.gpg"
graylog_apt_repo_pkg:   "https://packages.graylog2.org/repo/packages/graylog-{{ graylog_version }}-repository_latest.deb"
graylog_config_dir:     "/etc/graylog/server"
graylog_config_file:    "{{ graylog_config_dir }}/server.conf"
graylog_data_dir:       "/var/lib/graylog-server"

mongodb_apt_key_url:    "https://www.mongodb.org/static/pgp/server-{{ mongodb_version }}.asc"
mongodb_apt_key_path:   "/usr/share/keyrings/mongodb-server-{{ mongodb_version }}.gpg"
mongodb_apt_repo:       "deb [ arch=amd64,arm64 signed-by={{ mongodb_apt_key_path }} ] https://repo.mongodb.org/apt/ubuntu {{ ansible_distribution_release }}/mongodb-org/{{ mongodb_version }} multiverse"

opensearch_apt_key_path: "/usr/share/keyrings/opensearch-keyring.gpg"
opensearch_apt_key_url:  "https://artifacts.opensearch.org/publickeys/opensearch.pgp"
opensearch_apt_repo:     "deb [signed-by={{ opensearch_apt_key_path }}] https://artifacts.opensearch.org/releases/bundle/opensearch/{{ opensearch_version }}/apt stable main"
opensearch_config_dir:   "/etc/opensearch"
opensearch_config_file:  "{{ opensearch_config_dir }}/opensearch.yml"
opensearch_jvm_options:  "{{ opensearch_config_dir }}/jvm.options"
