[defaults]
inventory          = inventory/hosts.ini
remote_user        = root
private_key_file   = ~/.ssh/id_ed25519
host_key_checking  = False
roles_path         = roles
retry_files_enabled = False
stdout_callback    = default
result_format      = yaml
interpreter_python = auto_silent

[privilege_escalation]
become        = False

[ssh_connection]
pipelining    = True
