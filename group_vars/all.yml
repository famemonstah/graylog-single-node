---
# ─────────────────────────────────────────────────────────────────────────────
# group_vars/all.yml  –  Graylog 7.0 single-node on Ubuntu 24.04
#
#  Stack: MongoDB 8.0  +  graylog-datanode  +  graylog-server
#  NOTE:  No standalone OpenSearch — graylog-datanode manages it internally.
#
#  REQUIRED before running:
#    password_secret  : openssl rand -hex 32
#    root_password    : echo -n 'yourpassword' | sha256sum | cut -d' ' -f1
# ─────────────────────────────────────────────────────────────────────────────

# ── Graylog ──────────────────────────────────────────────────────────────────
graylog_version: "7.0"

# Generate: openssl rand -hex 32
graylog_password_secret: ""
# Generate: echo -n 'yourpassword' | sha256sum | cut -d' ' -f1
graylog_root_password_sha2: ""
graylog_root_username: "admin"

graylog_is_leader: true

graylog_http_bind_address: "0.0.0.0:9000"
graylog_http_publish_uri:  "http://192.168.27.107:9000/"
graylog_http_external_uri: "http://192.168.27.107:9000/"

graylog_mongodb_uri: "mongodb://127.0.0.1:27017/graylog?replicaSet=rs0"

# ── Graylog Data Node (embedded OpenSearch) ─────────────────────────────
datanode_heap: "1g"              # ~50% of RAM, max 31g

# ── MongoDB ───────────────────────────────────────────────────────────────────
mongodb_version: "8.0"           # 8.0 has native Ubuntu 24.04 (noble) repo
